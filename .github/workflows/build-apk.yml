name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get current version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Compilando APK com versão: $CURRENT"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/PhysiqCalc.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhysiqCalc
          path: android/app/build/outputs/apk/debug/PhysiqCalc.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: PhysiqCalc v${{ steps.version.outputs.current }}
          body: |
            ## PhysiqCalc v${{ steps.version.outputs.current }}

            APK gerado automaticamente.

            **Download:** Baixe o `PhysiqCalc.apk` abaixo.
          files: android/app/build/outputs/apk/debug/PhysiqCalc.apk
          generate_release_notes: true
          make_latest: true

      - name: Bump version for next build
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEXT="$MAJOR.$MINOR.$NEW_PATCH"
          echo "Preparando próxima versão: $CURRENT -> $NEXT"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEXT';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to v$NEXT [skip ci]"
          git push
